{% extends "room-base.html" %}
{% block title %}posts{% endblock%}
{%block links%}<link rel="stylesheet" href="{{ url_for('static', filename='styles/pro-pos.css') }}">{%endblock%}

{%block posts%}
<main class="feed-page">
  <h1 class="feed-heading">Posts</h1>

  <!-- ---- Composer: create a post, optionally attach an image ---- -->
  <div class="composer-card">
    <div class="composer-top">
      <div class="avatar">You</div>
      <textarea id="postText" placeholder="Share something with everyone..." rows="1"></textarea>
    </div>

    <div class="image-preview" id="imagePreview">
      <img id="imagePreviewImg" src="" alt="Selected image preview">
      <button type="button" class="remove-image" id="removeImage" aria-label="Remove image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="composer-actions">
      <label class="image-upload-label" for="imageInput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Add image
        <input type="file" id="imageInput" accept="image/*">
      </label>

      <button type="button" class="post-submit" id="postSubmit" disabled>Post</button>
    </div>
  </div>

  <!-- ---- Feed ---- -->
  <div id="feed">
    <!-- existing posts render here; JS prepends new ones above these -->
  </div>
</main>
{%endblock%}
{% block scripts %}
<script src="{{ url_for('static', filename='javascript/post.js') }}"></script>
{% endblock %}

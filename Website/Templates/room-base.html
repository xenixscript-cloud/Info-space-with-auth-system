<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title%}general — Chatline{% endblock %}</title>
  {%block styles%} {%endblock%}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='styles/room.css') }}">
  {%block links%}{%endblock%}
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-dot"></span>
    <span class="brand-name">Chatline</span>
  </div>

  <nav class="nav-links">
    <a href="/room" class="active">Rooms</a>
    <a href="{{ url_for('view.profiles') }}">Profile</a>
   <a href="{{ url_for('view.posts') }}" id="postsLink">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      <span>Posts</span>
    </a> 

    <a href="/settings">Settings</a>
  </nav>

  <button onclick="window.location.href='{{ url_for('auth.login') }}'" class="logout-btn" id="logoutBtn" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Log out
  </button>
</header>

<div>
{% block room %}
  {% endblock %}
</div>
{%block posts%}{%endblock%}
  {%block profiles%}{%endblock%}
</body>
  <script src="{{ url_for('static', filename='javascript/room.js') }}"></script>
  {% block scripts %}
{% endblock %}
</html>

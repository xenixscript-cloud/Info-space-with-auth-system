{% extends "base.html" %}

{% block title %}Login{% endblock %}
 {% block css %}<link rel="stylesheet" href="{{ url_for('static', filename='styles/Test.css') }}">{% endblock %}

{% block main %}

<div class="login-page">

    <div class="login-card">

        <!-- Left Side -->
        <div class="login-info">

            <h1>Welcome Back</h1>

            <p>
                Sign in to continue exploring discussions,
                share your ideas, and connect with the community.
            </p>

        </div>

        <!-- Right Side -->
        <div class="login-form">

            <h2>Login</h2>

<form method="POST">
    
        <input
            type="email"
            id="email"
            name="email"
            placeholder="Email Address"
            required
        >
    
        <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
        >
    
        <button type="submit">
            Login
        </button>
    
 </form>

            <div class="login-footer">
                Don't have an account?
                <a href="{{ url_for('auth.sign_up') }}">Create one</a>
            </div>

        </div>

    </div>

</div>

{% endblock %}
